global:
  scrape_interval: 15s

scrape_configs:

  - job_name: postgres
    static_configs:
      - targets: ['postgres_exporter:9187']

  - job_name: redis_hot
    static_configs:
      - targets: ['redis_exporter_hot:9121']

  - job_name: redis_analytics
    static_configs:
      - targets: ['redis_exporter_analytics:9121']
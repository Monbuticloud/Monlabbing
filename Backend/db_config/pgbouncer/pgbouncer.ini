[databases]

; primary write database
postgres_main = host=postgres port=5432 dbname=${POSTGRES_DB} user=${POSTGRES_USER} password=${POSTGRES_PASSWORD}

; read replica
postgres_replica = host=postgres_replica port=5432 dbname=${POSTGRES_DB} user=${POSTGRES_USER} password=${POSTGRES_PASSWORD}

; metrics database (Timescale)
metrics = host=timescaledb port=5432 dbname=${METRICS_DB} user=${METRICS_USER} password=${METRICS_PASSWORD}


[pgbouncer]

; listen settings
listen_addr = 0.0.0.0
listen_port = 6432

; authentication
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; pooling mode
pool_mode = transaction

; connection limits
max_client_conn = 400
default_pool_size = 30
min_pool_size = 5
reserve_pool_size = 10
reserve_pool_timeout = 3

; server behavior
server_reset_query = DISCARD ALL
server_check_delay = 30
server_lifetime = 3600
server_idle_timeout = 600

; per-db/user limits
max_db_connections = 80
max_user_connections = 80

; logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

; admin
admin_users = ${POSTGRES_USER},${METRICS_USER}
stats_users = ${POSTGRES_USER},${METRICS_USER}

; runtime
pidfile = /var/run/pgbouncer/pgbouncer.pid